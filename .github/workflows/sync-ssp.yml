name: Sync SSP Data
on:
  schedule:
    - cron: '0 */12 * * *'   # 00:00 e 12:00 UTC
  workflow_dispatch: {}       # Trigger manual

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gdown pandas openpyxl requests

      - name: Run sync
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python sync_ssp.py

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dados_tratados.csv data/sync_manifest.json
          git diff --staged --quiet || git commit -m "chore(data): sync SSP data [automated]"
          git push
